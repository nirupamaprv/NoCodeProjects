<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medium Headlines Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f9f8f6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    color: #1a1a1a;
  }
  .container { max-width: 760px; width: 100%; }
  header { margin-bottom: 2rem; text-align: center; }
  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1a1a1a;
    margin-bottom: 0.4rem;
  }
  header p { font-size: 0.95rem; color: #6b6b6b; }
  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e8e6e0;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #444;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  textarea {
    width: 100%;
    padding: 0.85rem 1rem;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    resize: vertical;
    min-height: 120px;
    color: #1a1a1a;
    background: #fafafa;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  textarea:focus { outline: none; border-color: #1a1a1a; background: #fff; }
  .options-row {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .option-chip {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
    color: #555;
    cursor: pointer;
  }
  .option-chip input { cursor: pointer; accent-color: #1a1a1a; }
  .btn-generate {
    width: 100%;
    margin-top: 1rem;
    padding: 0.9rem;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    font-family: inherit;
  }
  .btn-generate:hover { background: #333; }
  .btn-generate:active { transform: scale(0.99); }
  .btn-generate:disabled { background: #aaa; cursor: not-allowed; }

  .results { display: none; }
  .results.visible { display: block; }
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .results-header h2 { font-size: 1rem; font-weight: 700; color: #1a1a1a; }
  .copy-all-btn {
    padding: 0.4rem 0.9rem;
    border: 1.5px solid #1a1a1a;
    border-radius: 6px;
    background: transparent;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    color: #1a1a1a;
    font-family: inherit;
    transition: background 0.15s;
  }
  .copy-all-btn:hover { background: #f0efeb; }

  .headline-list { list-style: none; }
  .headline-item {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid #f0efeb;
    cursor: pointer;
    transition: background 0.1s;
    border-radius: 6px;
    padding-left: 0.5rem;
    padding-right: 0.5rem;
  }
  .headline-item:last-child { border-bottom: none; }
  .headline-item:hover { background: #f9f8f6; }
  .headline-num {
    font-size: 0.75rem;
    font-weight: 700;
    color: #bbb;
    min-width: 22px;
    padding-top: 2px;
  }
  .headline-text {
    font-size: 1rem;
    line-height: 1.5;
    color: #1a1a1a;
    flex: 1;
  }
  .copy-icon {
    opacity: 0;
    font-size: 0.75rem;
    color: #999;
    padding-top: 3px;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .headline-item:hover .copy-icon { opacity: 1; }
  .copied-flash { color: #2d7a3a !important; opacity: 1 !important; }

  .loading {
    display: none;
    text-align: center;
    padding: 2rem;
    color: #888;
    font-size: 0.95rem;
  }
  .loading.visible { display: block; }
  .dots::after {
    content: '';
    animation: dots 1.4s infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }
  .tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 4px;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tag-how { background: #e8f4fd; color: #1565c0; }
  .tag-why { background: #fef3e2; color: #b45309; }
  .tag-what { background: #edf7ed; color: #2d7a3a; }
  .tag-num { background: #f3e8ff; color: #7c3aed; }
  .error-msg {
    background: #fff5f5;
    border: 1px solid #fca5a5;
    border-radius: 8px;
    padding: 1rem;
    color: #b91c1c;
    font-size: 0.9rem;
    display: none;
  }
  .error-msg.visible { display: block; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>✍️ Medium Headlines Generator</h1>
    <p>Describe your topic or content summary — get 25 click-worthy titles, instantly.</p>
  </header>

  <div class="card">
    <label for="topic">Your topic or content summary</label>
    <textarea id="topic" placeholder="e.g. I wrote a piece about how introverts can thrive in open-plan offices using 5 practical strategies I discovered after 10 years of remote work..."></textarea>

    <div class="options-row">
      <label class="option-chip">
        <input type="checkbox" id="pref-howwhy" checked>
        Prefer How / Why / What titles
      </label>
      <label class="option-chip">
        <input type="checkbox" id="pref-numbers" checked>
        Include numbers where relevant
      </label>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generate()">Generate 25 Headlines →</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="loading" id="loading">
    <span class="dots">Generating your headlines</span>
  </div>

  <div class="results card" id="results">
    <div class="results-header">
      <h2 id="results-title">25 Headlines</h2>
      <button class="copy-all-btn" onclick="copyAll()">Copy All</button>
    </div>
    <ul class="headline-list" id="headlineList"></ul>
  </div>
</div>

<script>
let headlines = [];

function getTag(text) {
  const t = text.toLowerCase();
  const hasNum = /\d/.test(text);
  const isHow = t.startsWith('how');
  const isWhy = t.startsWith('why');
  const isWhat = t.startsWith('what');
  const tags = [];
  if (isHow) tags.push('<span class="tag tag-how">How</span>');
  if (isWhy) tags.push('<span class="tag tag-why">Why</span>');
  if (isWhat) tags.push('<span class="tag tag-what">What</span>');
  if (hasNum) tags.push('<span class="tag tag-num">#</span>');
  return tags.join('');
}

async function generate() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) {
    document.getElementById('topic').focus();
    return;
  }

  const prefHowWhy = document.getElementById('pref-howwhy').checked;
  const prefNumbers = document.getElementById('pref-numbers').checked;

  document.getElementById('generateBtn').disabled = true;
  document.getElementById('results').classList.remove('visible');
  document.getElementById('errorMsg').classList.remove('visible');
  document.getElementById('loading').classList.add('visible');

  const prefs = [];
  if (prefHowWhy) prefs.push('- Strongly prefer "How", "Why", and "What" style titles where they fit naturally.');
  if (prefNumbers) prefs.push('- Include a number in the title wherever it feels compelling and relevant (e.g. "7 Ways", "3 Reasons", "The 5 Rules of...").');

  const systemPrompt = `You are a world-class headline copywriter specializing in Medium.com articles. You generate titles that are curiosity-driving, specific, and optimized for clicks and reads on the Medium platform. Your titles feel human, not SEO-spammy. They promise a clear, valuable takeaway.`;

  const userPrompt = `Topic/Summary: "${topic}"

Generate exactly 25 unique, compelling headlines for this Medium article.

Preferences:
${prefs.length ? prefs.join('\n') : '- Mix of styles — listicles, questions, statements, How/Why/What.'}
- Titles should vary in structure and length. Don't repeat the same format back-to-back.
- Make them specific — avoid generic phrases like "The Ultimate Guide" or "Everything You Need to Know."
- Aim for emotional resonance, curiosity gaps, or a surprising angle.
- Keep each under 75 characters when possible (ideal for Medium previews).

Return ONLY a numbered list 1–25. One title per line. No commentary, no intro text, no blank lines between items.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '';

    headlines = text
      .split('\n')
      .map(l => l.replace(/^\d+[\.\)]\s*/, '').trim())
      .filter(l => l.length > 0)
      .slice(0, 25);

    if (headlines.length === 0) throw new Error('No headlines returned.');

    renderHeadlines();
  } catch (err) {
    document.getElementById('errorMsg').textContent = 'Something went wrong: ' + (err.message || 'Unknown error.');
    document.getElementById('errorMsg').classList.add('visible');
  } finally {
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('generateBtn').disabled = false;
  }
}

function renderHeadlines() {
  const list = document.getElementById('headlineList');
  list.innerHTML = '';
  headlines.forEach((h, i) => {
    const li = document.createElement('li');
    li.className = 'headline-item';
    li.onclick = () => copyOne(h, li);
    li.innerHTML = `
      <span class="headline-num">${i + 1}</span>
      <span class="headline-text">${getTag(h)}${escHtml(h)}</span>
      <span class="copy-icon">Copy</span>`;
    list.appendChild(li);
  });
  document.getElementById('results-title').textContent = `${headlines.length} Headlines`;
  document.getElementById('results').classList.add('visible');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyOne(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    const icon = el.querySelector('.copy-icon');
    icon.textContent = 'Copied!';
    icon.classList.add('copied-flash');
    setTimeout(() => {
      icon.textContent = 'Copy';
      icon.classList.remove('copied-flash');
    }, 1500);
  });
}

function copyAll() {
  const text = headlines.map((h, i) => `${i + 1}. ${h}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-all-btn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('topic').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generate();
});
</script>
</body>
</html>
